name: Update profile stats

on:
  schedule:
    - cron: "0 20 * * *" # daily at 04:00 SGT
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/stats.yml"

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Streak cards work with the built-in GITHUB_TOKEN (public contributions only)
      - name: Generate streak card (light)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=jianrontan&theme=default&hide_border=true
          path: assets/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak card (dark)
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=jianrontan&theme=tokyonight&hide_border=true&background=00000000
          path: assets/streak-dark.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit streak cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg assets/streak-dark.svg
          git commit -m "Update streak stats" || exit 0
          git push

      # Metrics needs a classic PAT with no scopes, saved as the METRICS_TOKEN
      # repo secret (the default GITHUB_TOKEN lacks the user-level permissions).
      # The action commits assets/metrics.svg itself via committer_token.
      - name: Generate metrics dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jianrontan
          filename: assets/metrics.svg
          config_timezone: Asia/Singapore
          base: header, activity, community, repositories
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, jupyter notebook
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
